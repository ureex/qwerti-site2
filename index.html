<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwerti — Swap & Bridge</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#050810;
  color:#e8f4ff;
  font-family:'Syne',sans-serif;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 30px;
}
.logo{
  font-weight:800;
  background:linear-gradient(90deg,#63d2ff,#00f5c4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
nav a{
  color:#63d2ff;
  text-decoration:none;
}

/* HERO */
#hero{
  text-align:center;
  padding:120px 20px 40px;
}
#hero h1{
  font-size:3rem;
  margin-bottom:10px;
}
#hero p{
  color:#6b8caa;
}

/* SWAP SECTION */
.swap-wrapper{
  display:flex;
  justify-content:center;
  padding:40px 20px 80px;
}

/* SWAP CARD */
.swap-card{
  width:100%;
  max-width:420px;
  padding:20px;
  border-radius:20px;
  background:rgba(12,17,32,0.9);
  border:1px solid rgba(99,210,255,.2);
  box-shadow:0 0 60px rgba(99,210,255,.1);
}

/* TOKEN BOX */
.token-box{
  background:#050810;
  padding:14px;
  border-radius:10px;
  margin-bottom:12px;
}

.token-label{
  font-size:.75rem;
  color:#6b8caa;
}

.token-name{
  font-weight:700;
  font-size:1.1rem;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#050810;
  color:white;
  margin:15px 0;
}

/* BUTTON */
.swap-btn{
  display:block;
  text-align:center;
  padding:14px;
  border-radius:12px;
  font-weight:800;
  text-decoration:none;
  color:#050810;
  background:linear-gradient(135deg,#63d2ff,#a06cff);
  box-shadow:0 0 25px rgba(99,210,255,.4);
  transition:.2s;
}
.swap-btn:hover{
  transform:translateY(-2px);
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  color:#6b8caa;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">Qwerti.ai</div>
  <a href="#swap">Swap</a>
</nav>

<!-- HERO -->
<section id="hero">
  <h1>Swap & Bridge</h1>
  <p>Buy your token instantly using Qwerti</p>
</section>

<!-- 🔥 MERGED SWAP SECTION -->
<section id="swap">
  <div class="swap-wrapper">
    <div class="swap-card">

      <div class="token-box">
        <div class="token-label">From</div>
        <div class="token-name">ETH</div>
      </div>

      <div style="text-align:center;margin:10px 0;">↓</div>

      <div class="token-box">
        <div class="token-label">To</div>
        <div class="token-name">Your Token</div>
      </div>

      <input type="number" placeholder="Enter amount">

      <a 
        href="https://app.qwerti.ai/buy/0x311935cd80b76769bf2ecc9d8ab7635b2139cf82/8453?campaign=sol-8453-36545"
        target="_blank"
        class="swap-btn"
      >
        🚀 Swap Now
      </a>

    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
Qwerti.ai — Swap & Bridge
</footer>

</body>
</html>
